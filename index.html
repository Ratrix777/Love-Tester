<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Love Tester</title>
    <link rel="icon" href="icon.png" type="image/png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" type="text/css" href="style.css" />
</head>

<body>
    <main>
        <h1>Love Tester</h1>
        <form>
            <div id="inputs">
                <input type="text" placeholder="NAME 1" id="name1" />
                <h2>+</h2>
                <input type="text" placeholder="NAME 2" id="name2" />
            </div>
        </form>
        <div id="buttons">
            <button id="resetButton">RESET</button>
            <button id="testButton">TEST</button>
        </div>
        <div id="result">
            <p id="resultText"></p>
            <div id="resultBar1">
                <div id=resultBar2></div>
            </div>
        </div>
    </main>
    <div id="themes">
        <button id="light">T</button>
        <button id="pink">H</button>
        <button id="blue">E M</button>
        <button id="green">E</button>
    </div>
    <footer>&copy; 2025 Ratrix</footer>

    <script type="text/javascript" src="script.js"></script>
</body>

</html>
